<!doctype html>
<html>
	<head>
		<title>Times</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- <link href="assets/reset.css" rel="stylesheet"> -->
		<link href="assets/style.css" rel="stylesheet">
		<script defer src="assets/main.js"></script>
		<script defer src="assets/form-state.js"></script>
	</head>
	<body>
		<h1>Times</h1>
		<!-- New element, who dis: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/form -->
		<form id="some-form">
			<section>
				<!-- Visible/accessible `label` connected through the `id`: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/label -->
				<label for="task-text">Task</label>
				<!-- Different types can control what is allowed: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/input -->
				<input id="task-text" name="task-text" placeholder="E.g. Cooking pasta" required type="text">
			</section>
			<section>
				<label for="time-number">Minutes taken:</label>
				<input type="time-number" id="time-number" name="minutes" placeholder="E.g. 10" required type="number"> 
			</section>
			<section>
				<label for="some-option">And a dropdown <code>&lt;select&gt;</code>:</label>
				<!-- Classic “dropdown”: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/select -->
				<select id="some-option" name="some-option">
						<option>With options</option>
						<option>Inside here</option>
						<option>To select</option>
						<optgroup label="Grouped">
							<option>You can organize</option>
							<option>Options in groups</option>
						</optgroup>
				</select>
			</section>
			<section>
				<label for="some-date">And then an <code>&lt;input&gt;</code> for a date:</label>
				<!-- Contrast this with the `text` above. -->
				<input id="some-date" name="some-date" type="date">
			</section>
			<section>
				<!-- `range` sliders are always fun. -->
				<label for="some-range">This <code>type="range"</code> one goes up to 11:</label>
				<input type="range" id="some-range" name="some-range" min="0" max="11" value="5">
			</section>
			<!-- Semantic groupings within `form`: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/fieldset -->
			<fieldset>
				<legend>Fieldsets can also group form elements</legend>
				<!-- And how different the `radio` type is! -->
				<input checked id="first-option" name="other-option" type="radio" value="first">
				<label for="first-option">First</label>
				<input id="second-option" name="other-option" type="radio" value="second">
				<label for="second-option">Second</label>
				<input id="third-option" name="other-option" type="radio" value="third">
				<label for="third-option">Third</label>
			</fieldset>
			<section>
				<!-- `button` for in-page actions: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/button -->
				<button type="reset">Reset</button>
				<!-- `button` without a type will submit their parent `form`. -->
				<button>Submit</button>
				<!-- There is also a special `submit` type: https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/input/submit -->
			</section>
		</form>
		<aside>
			<p><em>These <a href="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/form">form</a> elements would normally have <code>action</code> and <code>method</code> attributes for communicating back to the server, but our static hosting can’t use these.</p>
		</aside>
	</body>
</html>

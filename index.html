<html>
	<head>

	<body>
		<h1>Times</h1>
		<!-- New element, who dis: https://developer.mozilla.org/en-US/docs/Web/HTML/Element/form -->
		
		 <form id="some-form">
      <section>                                                                 
          <ul id="task-list"></ul>        
      </section>
                                                                                
      <section>
          <label for="task-text">Task</label>                                   
          <input id="task-text" name="task-text" placeholder="E.g. Cooking 
  pasta" required type="text">                
                                          
          <label for="time-number">Minutes taken:</label>                       
          <input id="time-number" name="minutes" placeholder="E.g. 10" required 
  type="number">                                                                
      </section>                                                                
                  
      <section>                                                                 
          <button id="add">Add Task</button>
      </section>                                                                
         </form>     

	</body>

<!doctype html>
<html lang="en">
	 <head>
      <title>Times</title>
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
      <link href="assets/reset.css" rel="stylesheet">
      <link href="assets/style.css" rel="stylesheet">
      <script defer src="assets/form-state.js"></script>
      <script defer src="assets/main.js"></script>
  </head>

	<body>
		<h1>Where does the time go?</h1>		
		<div id="progress-bars">                                                      
      		<div class="progress-item">                                               
          		<span class="progress-label">Tasks <span id="task-count">0</span>/12</span>                                            
         			<div class="progress-track">    
                		<div class="progress-fill" id="task-bar"></div>
          			</div>                                                                
      		</div>
           <div class="progress-item">
          		<span class="progress-label">Minutes <span id="minute-count">0</span>/480</span>
          			<div class="progress-track">
             			<div class="progress-fill" id="minute-bar"></div>
          			</div>
      		</div>
           <div class="progress-item">
                <span class="progress-label">Done <span id="completed-count">0</span></span>
                <div class="progress-track">
                    <div class="progress-fill" id="completed-bar"></div>
                </div>
            </div>
      </div>    

		 <form id="some-form">

			  <button type="button" id="mobile-add-btn">+</button>      
			  
      <section>                                                                 
          <ul id="task-list"></ul>     
      </section>
                                                                                
      <section>
          <label for="task-text">Task</label>
          <input id="task-text" name="task-text" placeholder="E.g. Cooking pasta" required type="text">

          <label for="time-number">Minutes taken</label>                             
  				<div id="minute-buttons">                                                     
      				<button type="button" data-minutes="10">10</button>
      				<button type="button" data-minutes="15">15</button>
     				<button type="button" data-minutes="30">30</button>
      				<button type="button" data-minutes="45">45</button>
      				<button type="button" data-minutes="60">60</button>
  				</div>                                                                        
            <input id="time-number" name="minutes" placeholder="Or type a number" required type="tel" min="1" max="120"> 
          <button id="add">Add Task</button>
      </section>                                                                
         </form>     

	</body>
</html>
